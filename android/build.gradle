plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

def expoDetectCarplayPackage = new groovy.json.JsonSlurper().parse(file('../package.json'))

group = 'expo.modules.detectcarplay'
version = expoDetectCarplayPackage.version

android {
  namespace "expo.modules.detectcarplay"
  defaultConfig {
    versionCode 1
    versionName expoDetectCarplayPackage.version
    minSdkVersion 23
  }
  lint {
    abortOnError false
  }
}

dependencies {
  implementation 'androidx.car.app:app:1.7.0'
  implementation 'androidx.work:work-runtime-ktx:2.9.1'
}
